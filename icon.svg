<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A55"/>
      <stop offset="55%" stop-color="#FF7A45"/>
      <stop offset="100%" stop-color="#E84A4A"/>
    </linearGradient>
    <linearGradient id="hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#FFD9C2" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 圆角方块背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 顶部高光 -->
  <rect width="512" height="512" rx="112" fill="url(#hi)"/>
  <!-- 左上角光晕 -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- 主体：哑铃图标，居中偏上 -->
  <g transform="translate(256, 232)">
    <!-- 杠杆 -->
    <rect x="-90" y="-12" width="180" height="24" rx="6" fill="#FFFFFF"/>
    <!-- 左配重大块 -->
    <rect x="-148" y="-44" width="34" height="88" rx="10" fill="#FFFFFF"/>
    <!-- 左配重小块 -->
    <rect x="-104" y="-30" width="18" height="60" rx="6" fill="#FFFFFF"/>
    <!-- 右配重小块 -->
    <rect x="86" y="-30" width="18" height="60" rx="6" fill="#FFFFFF"/>
    <!-- 右配重大块 -->
    <rect x="114" y="-44" width="34" height="88" rx="10" fill="#FFFFFF"/>
  </g>
  <!-- 文字 FIT -->
  <text x="256" y="412" text-anchor="middle" font-family="-apple-system, system-ui, 'Helvetica Neue', sans-serif"
        font-size="76" font-weight="900" fill="#FFFFFF" letter-spacing="6" opacity="0.96">FIT</text>
</svg>
